version: 2

project_name: heimdall

builds:
  - id: heimdall
    main: ./cmd/heimdall
    binary: heimdall
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/amanthanvi/heimdall/internal/version.Version={{ .Version }}
      - -X github.com/amanthanvi/heimdall/internal/version.Commit={{ .Commit }}
      - -X github.com/amanthanvi/heimdall/internal/version.BuildTime={{ .Date }}

archives:
  - id: standalone
    ids:
      - heimdall
    formats:
      - tar.gz
    name_template: "heimdall-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

sboms:
  - id: binaries
    artifacts: archive

nfpms:
  - id: heimdall-deb
    package_name: heimdall
    ids:
      - heimdall
    formats:
      - deb
    maintainer: Aman Thanvi <amanthanvi2002@gmail.com>
    description: Secure local SSH vault and workflow CLI.
    license: MIT
    bindir: /usr/bin

homebrew_casks:
  - name: heimdall
    ids:
      - standalone
    binaries:
      - heimdall
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/heimdall"]
          end
    homepage: https://github.com/amanthanvi/heimdall
    description: Secure local SSH vault and workflow CLI.
    url:
      verified: github.com/amanthanvi/heimdall/
    repository:
      owner: amanthanvi
      name: homebrew-tap

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - heimdall
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true

release:
  draft: false
